services:
  consumer:
    build:
      context: .
      dockerfile: ./consumer-dockerfile
    networks:
    - logs
    depends_on:
      rbmq:
        condition: service_healthy
    command: ["./myapp", "*.orange.*"]
    environment:
      AMQP_URL: amqp://app_user_1:app_pass_1@rbmq:5672/
    deploy:
      mode: replicated
      replicas: 5


  producer:
    build: 
      context: .
      dockerfile: ./producer-dockerfile
    networks:
    - logs
    depends_on:
      rbmq:
        condition: service_healthy
    ports:
      - 8080:8080
    command: ["./myapp", "fast.orange.fish"]
    environment:
      AMQP_URL: amqp://app_user_1:app_pass_1@rbmq:5672/

  rbmq:
    image: rabbitmq:4.2-management-alpine
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_CONFIG_FILE: /run/secrets/rabbitmq_conf
    secrets:
      - rabbitmq_conf
    networks:
        - logs
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 4

secrets:
  rabbitmq_conf:
    file: ./rabbitmq.conf

networks:
  logs:
    driver: bridge
