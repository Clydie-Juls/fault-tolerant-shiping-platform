# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: psql
  labels:
    app: psql
spec:
  selector:
    matchLabels:
      app: psql
  replicas: 1
  template:
    metadata:
      labels:
        app: psql
    spec:
      volumes:
        - name: psql-secret-volume
          secret:
            secretName: db-secret
      containers:
      - name: psql
        image: postgres:18.1-alpine
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command: ["pg_isready", "-h", "localhost"]
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-h", "localhost"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
          - name: psql-secret-volume
            readOnly: true
            mountPath: /run/secrets/sql_pass
        envFrom:
          - configMapRef:
              name: psql-config
---
# https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: psql-service
spec:
  selector:
    app: psql
  type: ClusterIP
  ports:
  - name: psql-service
    port: 5432
    targetPort: 5432
---


